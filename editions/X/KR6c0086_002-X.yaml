body:
  text: 究竟無我分第十七分為四節究推究竟窮盡也無我即是無四相而但云無我者四相皆因我相而生無我即無四相也究竟無我有二義一是自然體直下究竟本無我體是也一是勉然法詳究到盡處只是無我是也經因自然體而示人以勉然法與中庸明則誠義相似爾時須菩提白佛言至阿耨多羅三藐三菩提心者講爾時須菩提聞佛不可思議之言復問佛云是經所重者發菩提心也若善男子善女人果能發此心究竟云何應住而不遷至於妄幻心云何降伏而不動佛告之曰菩提心者本來自有當體現成原為人所同具只因眾生蔽於塵染不能滅度而取捨人我紛擾此心者多矣當生如是滅度眾生心我應滅度一切眾生如煩惱妄想貪瞋癡心種種四生之類皆為點破喚醒一一除滅而度脫之既滅度一切眾生已則智慧觀照息妄還真一切眾生原非本性中所有而我心中一念不起同歸寂滅無有一眾生實是我滅度之者此何以故蓋學道菩薩一留度生之心而不化則四相未除妄想現前迷惑本性即非菩薩矣所以然者何也不惟度生非實即發心亦非實法求發心之我尚不可得況度生之我耶菩薩以發菩提心得名心本空寂其發菩提心不過自悟自修自度度人實無有法得發此阿耨多羅三藐三菩提心可知發心是因眾生而名無法發心乃真實義也須菩提於意云何至當得作佛號釋迦牟尼註如來佛自謂也授付也記誌也佛以心印相傳曰授記梵語釋迦此云能仁謂心性純全含容一切也梵語牟尼此云寂默謂心體本寂動靜不遷也寂默為體即是如能仁為用即為來先釋迦而後牟尼者攝用以歸體也先如而後來者從體以起用也總是一箇真性加號則為釋迦牟尼通稱則為如來又為佛佛者大覺也不從形相言也形相佛因設化眾生隨緣應迹耳應化事詳首卷講佛呼須菩提反問云汝聞我說實無有法發菩提心者於汝意中云何若菩提心有法可得則如來宜先得之矣昔日如來為菩薩時於然燈佛所可曾有法得菩提不須菩提言不也世尊如我解佛所說實無有法發菩提心之義則知佛於然燈佛所無有法得無上菩提也蓋佛於本師處乃自性自悟非有秘密之法傳授而得佛深契須菩提之言故重許之云如是如是須菩提果是實無有法如來得無上菩提也若使有法而如來得無上菩提者然燈佛當舉法以傳於我則不與我止授記云汝於來世當得作佛號為釋迦牟尼以實無有法而得無上菩提是故然燈佛與我授記因作是言汝於來世當得作佛號釋迦牟尼此外更無付囑也何以故如來者即諸法如義至為非大身是名大身註如來者真性之稱遍虗空法界而常自如隨所感而應現是如來即諸法如義之謂諸眾也法者處事之方如義者謂真性本來自如其見之於諸法者皆自然而然來為應迹去無留滯如如不動之義也於是中者謂菩提體中即真性中也講此顯法身不屬因果也佛恐須菩提執定如來是有修有得未達法身不屬因果既以無所得破之矣猶恐未悟故直示之曰何故言菩提無所得耶以如來者非有相之稱乃是諸法常體如如之義耳若有人不知如來是諸法中之真如義而言別有法名如來得此無上菩提須菩提實無有法佛得無上菩提蓋佛自得之非有法以得之也故如來所得無上菩提其於是中一法不立無相可求不可認以為實無法不備為諸相之體不可認以為虗唯是無實無虗之故如來所說一切法皆是不著四相不染六塵發明真性之理用以修行而成佛之法也法豈可廢哉然法固不可廢而亦不可執也即所言一切法者不過指示迷途除去四相假此以修行若真性既悟能自得之法亦何有即非一切法是虗名一切法耳非真性中所有也須菩提所言一切法者有而非實有譬如人身長大人身雖長且大果真為長大乎須菩提深契佛旨答云如來說人身長大者不過形軀色相一時假合即非真實大身是虗名為大身而已知大身非身則知諸法非法須菩提菩薩亦如是至如來說名真是菩薩註梵語菩薩此云覺眾生亦如是者指上文而言亦如大身之不實也作是言者指下文而言謂我滅度眾生也我當莊嚴佛土此佛土謂佛剎上如來說莊嚴佛土此謂佛之心土通達者見得十分透徹也無我者無有我見也法理也真菩薩謂造到無我地位即正等正覺故云真也講佛說大身不為真實固矣然不獨大身也須菩提菩薩之名為覺眾生者其不實亦如是也蓋真性中本無眾生祇因業緣現相由我相立而成四相則眾生並從業緣中現反之真性了無可見若菩薩自言我當滅度無量眾生則是有心除滅分別眾生我相未離而反自增障即不得名為菩薩矣此何以故菩薩雖以佛法滅度眾生得名但真性中惟無上菩提本無眾生可度又何有背可據實無有法滅度眾生以名為菩薩也是故佛所說一切法不過隨機順應開導眾生以悟本性豈有法相之見哉無我人眾生壽者之四相矣不特法無相見也夫上求佛果下化眾生皆菩薩事也既求佛果則當嚴佛土矣然嚴土亦非實法也若菩薩自言我當以七寶五采莊飾嚴整佛之剎土是著於有相豈足名為菩薩何以故如來所說莊嚴佛土者非為外貌粉飾乃即心佛土也心土無相本來清淨云何莊嚴菩薩六塵不染清淨長存不作莊嚴相非莊嚴中有妙莊嚴焉是則名為莊嚴也度生嚴土皆非實有此真無我法也我前言無上菩提其說雖多總是無我之法夫法界本空一有我便著形迹人與眾生壽者緣我而有勢必執其有法有滅度有莊嚴何得名為菩薩乎若菩薩通達無我法者我尚無有何更有法人法兩空湛然清淨此如來說名真是菩薩矣一體同觀分第十八佛具五眼體非實有惟常在真心虗靈不昧眼雖分五照共一心所謂萬法歸一更無異觀非眾生種種諸心妄見所及宋徵與曰若有妄心即有妄見諸相成沙三際為限五眼不通若無妄心則無三際可得五眼一時開明非諸沙相所能隔故曰一體同觀須菩提於意云何至現在心不可得未來心不可得註五眼者以形論則為眼目以理論則為心竅眼通于心凡人皆有曰與佛無異但因四相六塵遮蔽只有肉眼而已佛有五眼乃常住真心寂照非過去未來現在妄心之觀見也肉眼以形相言天眼以諸天言慧眼以智慧言法眼以了諸法言佛眼以佛知見言眼以囑照為義五眼非實有五眼也約所見以為眼耳如是世尊如是者應承之辭有如是沙等恒河言恒河之多如一恒河沙之多佛世界又如眾恒河沙之多爾所指言恒河沙數之世界若干若如也于數也猶言許多種心謂眾生種種心也過去心已滅現在心不住未來心未生故皆不可得此指生滅妄心即若干種心之心也講前說不見彼是眾生不見我為菩薩不見淨佛國土如是則不見諸法名為如來將疑如來為無所知見者耶然而如來具足五眼豈果無所見耶故問須菩提曰人目中有清淨眼根能見形色者為肉眼如來有否答曰如來雖不局於肉眼而亦有肉眼也又問諸天能作觀行見世界中所有者謂之天眼如來有否答曰如來雖不囿于天眼而亦有天眼也又問以根本智證真空理謂之慧眼二乘有之如來有否答曰如來雖不同於二乘而亦有慧眼也又問以差別智明一切法謂之法眼菩薩有之如來有否答曰如來雖不等於菩薩而亦有法眼也又問諸佛覺性圓滿見光周徧謂之佛眼如來有否答曰如來與諸佛同體寂照自如了無障礙如來有佛眼也疊舉五眼為問須菩提皆以有是眼答如來既具能見之眼即具能知之智故佛又以河沙為問更舉河沙之多以數佛之世界果多不乎須菩提亦以甚多答之佛告須菩提恒河沙等之恒河沙一沙一世界國土中所有眾生各具一心則其心有若干種如來以清淨五眼皆盡見而知之所以悉知者是何緣故如來所說眾生諸心總從六塵影現皆識神顛倒之妄心非真實常住之本心是虗名為心耳所以說非心者何也須菩提汝試觀既事之後則為過去心當時則有事過便無可能常留而不滅乎不可得也過事之際則為現在心忽然著想究竟成虗可能實守而不變乎不可得也未事之時則為未來心時事未臨于何懸擬可能豫設而不失乎不可得也如來悉知者知此不可得之心而已三際覓心了不可得識得他不可得處故知諸心皆為非心是名為心然則如來豈冥然一無所見乎正以五眼圓明洞見到諸心非心是以能一法不存法法歸於無我耳可見如來具足五眼原無能見所見而智眼亦歸無我也剩閒曰三心不可得佛只申明得皆為非心是名為心二語如何是真心不曾說破講者只好隨佛言繳明上文於言外略為指示數語補明真心之意歸到一體同觀乃為經文正義若急於欲明真心於上文是名為心有作指點真心於三不可得下從佛口中添出是名真心以繳上是名為心語意雖似深妙與上下文勢欠合故以皆為非心是名為心一直說下不點破真心者為正解也法界通化分第十九佛身充法界通達化無邊法界佛世界也世界由心建立心為萬化所從出佛心能悟實性法身充滿法界則變通莫測神化無方其福德之多無有窮盡矣須菩提於意云何若有人滿至如來說得福德多註因依也藤蘿附木而生曰緣因緣者因其布施之功而緣之以得福德也福德有實者取相也福德無故離相也是人指以世界實施之人取相之福德雖甚多而非實離相之福雖似無而實有故足言多前云甚多以俗見言之即以甚多者為不多以佛見言之也講七寶布施佛以屢言之而此復說者以上文言眾生心虗妄不可得如是則福德依心而成亦是虗妄六度萬行俱非實法修福又何益耶故再發明無住相施之福德以見因緣修福不可廢但施相之不可不離也因問須菩提曰若有人以滿三千大千世界之七寶而為布施此因眾生心發出之善行也以是布施廣結因緣得福多不須菩提言果從因生因從緣就此人以是布施因緣得福甚多也如來說因緣二字須菩提已深領此意但未發明原故所以又呼須菩提而言曰所云福德多者若以福德為有實則妄識住相取著能所有違于本來空寂無為之體即成顛倒心如來說是有漏福德其報有限不足為多也若以真智行慈隨緣布施能離于相不見福德為實有順於本來空寂無為之體即非顛倒心此乃無為淨福等如虗空所以如來說得福德多耳然則妄心住相之福不當修智慧離相之福不當不修耶福德無故福德多則福德仍歸無我修福原不礙菩提也離色離相分第二十色者顏色相者形體離者不著言求見如來者離諸色相也須菩提於意云何至即非足是名諸相具足註色身者三十二相也諸相者謂種種變現神通之相又不止三十二相矣具足者無少欠缺也色身主離色言諸相主離相言講前言身相非相諸相非相須菩提已知有法身法相此承上福德無為福德多佛恐須菩提以如來色身認為法身故設問曰佛可以具足色身見不須菩提即解其意遂答曰不也世尊覺性虗空非形所囿如來不應以具足色身見何以故如來所說具足色身乃是幻化應身非真有具足色身也是名為具足色身耳而可以色身見如來也哉佛又問須菩提曰如來變現神通之相諸相具足可以具足諸相見不須菩提亦答曰不也世尊蓋諸相亦形相耳雖具足不應以見如來也何以故如來所說諸相具足乃外貌應現形相非真有此諸相具足也是名為諸相具足耳其可以諸相見如來也哉非說所說分第二十一分為二節無上菩提乃本來真性此非言語可說也如來為覺悟眾生只得以言語化導演說般若要知所說法正為此非言語可說者謂不可說恧說也須菩提汝勿謂如來作是念至無法可說是名說法註勿謂莫作皆禁止辭言勿謂如來心中自念云我當有所說法度眾蓋如來隨眾生根器而覺悟之初未嘗有說法之心也若言有所說法是不明說法之旨與佛意違背非謗而何以本性真空有何可說今云說法亦名耳非實有法可說也講佛告須菩提曰汝勿謂如來有心作此念頭我當有所說法以開示於人汝切莫作是念此何以故設若有人言如來有所說法則是淺見寡識滯在言辭之末違背真空妙諦即為謗佛不能解會我所說之義故也又呼須菩提曰當知所謂說法者雖以言顯猶以悟通默識心源非言語能到無法可說是名說法也蓋無可說而說名為說法爾時慧命須菩提白佛言至說非眾生是名眾生註爾時者當啟問之時慧智慧以德言命壽命以齒言謂有智慧而高年長老也人至老耄則昏聵者多須菩提老而得慧眼年高有德表稱以動眾講爾時具智慧通命源之須菩提深契佛旨恐無說之說具佛慧者方能知之眾生未必知不知又安能信因白佛言頗有眾生於未來世得聞如來所說無法可說之法能生實信心而無疑焉否佛語須菩提曰汝勿慮未來之世無有信佛法的眾生蓋佛與眾生初非兩類同具此心彼為眾生而真性原有非可以眾生目之彼雖非眾生而業緣現在又非可以不眾生目之何以故也眾生於眾生之中不能超脫者以其不悔悟更新自暴自棄遂為眾生耳若如來所說人性皆善有何凡聖之殊原非實有眾生是假名為眾生也本性自在安得聞佛所說而不生信心哉無法可得分第二十二無上菩提本是真空我尚非有何况於法故曰無法可得須菩提白佛言世尊至是名阿耨多羅三藐三菩提講須菩提白佛言曰我佛妄盡覺滿得此阿耨多羅三藐三菩提豈非以萬法俱空圓明寂照不俟外求正為無所得乃為真得耶佛深契須菩提之問而重許之言如是如是我於阿耨多羅三藐三菩提不從外得乃我之真性也真性虗空神凝智泯情絕思澄不可以色相取不可以言說求無有少法可得止為開導眾生是以名為阿耨多羅三藐三菩提使人知所歸依耳豈有法可得哉淨心行善分第二十三妙性空寂固無法可得然欲得無上菩提又當何所修耶必須淨其心以行諸善事借此法為入道之門宗泐曰淨心行善者不著一法于心而行此善法也復次須菩提是法平等至即非善法是名善法註是法即指菩提覺體無法之法乃真法也平等謂凡有知者必同體也無有高下者非聖具而凡虧也在聖不增故曰無高在凡不減故曰無下一切善法如布施持戒忍辱精進之類是也講阿難復編次佛告須菩提曰是無可說無可得之菩提法乃本然之性原自平等在眾生不減在諸佛不增無聖無凡色身則有高下而真性初無高下之分所以名為阿耨多羅三藐三菩提也何以為是名也以真性中無有我人眾生壽者四相之妄但見為平等故有是名也平等之法不從性外得矣然豈蓋廢修證哉倘認本來現成不假修行此又廢法沉空愚迷不返者也唯依平等無相心修一切六度萬行之善法則虗己含真從此明心見性造至覺地即得阿耨多羅三藐三菩提矣此所謂自修自證真無少法可得者須菩提不惟菩提無法可執即一切善法在所當修而亦不可執泥蓋所謂善法者不過借此以接引眾生開悟羣迷耳及悟菩提善法何有本性中原無有此法也如來說即非善法是名善法法非實有而可執泥也哉菩提之無少法可得也益明矣福智無比分第二十四福即福德智即智慧住相實施為人天有漏之因只可言福持經演說為本性無量之功不惟有福兼為有智此福與智合等如虗空無可比方者也須菩提若三千大千世界中至算數譬喻所不能及註如是等七寶聚言七寶所聚之多等之于須彌山王之高大也佛以性中福德為最上者皆為世人妄執因緣要求福報之厚故隨機逗教反覆言之以破人著相有為妄福而勉人以修身修性耳講上言善法皆空恐人又以經文為空談故以福德較之使知自修也佛告須菩提云須彌為眾山之王可謂高大矣若三千大千世界中所有諸山盡如須彌是高大而且多也若有人積如是七寶以成聚用此布施福德固為高大而多矣然自性若迷施福享盡不免墮落福何可救于性何益設若有人以此般若波羅蜜經乃至四句偈等受持而有得於心讀誦而演說其義則不徒自度且能度人利益無窮是修自性福德智慧此七寶布施之福德不及比持經福德百分之一豈止百分之一雖千萬億分乃至算數之多譬喻之廣亦不能及此一分也人可徒求布施福而不修性福哉化無所化分第二十五化者度眾生也無所化者實無眾生得滅度也蓋佛雖設法以化眾然法非強設眾生本有佛性原非凡夫不過隨其本性而導之故有化而歸於無所化也須菩提於意云何至即非凡夫是名凡夫註未度曰眾生度後非眾生非眾生則無眾生相故曰實無有眾生如來度者如來說有我者就對凡夫而言耳色身本空我有何在但凡夫不悟妄認色身以為我耳講如來度生現無邊身說無量法實實見之行事一一圓滿非菩薩可及豈可云無滅度乎殊不知是法平等則是眾生本來寂滅如來不過因其為眾生而設法以度之如來不作度生念所以能度生也故呼須菩提而告之曰汝意云何汝等學道諸人勿謂如來實有是念我當用法以化度眾生汝等莫作是念可也此何以故蓋般若真性人人具足雖如來以法度之然亦度其所自有非益其所本無化歸無化實無有眾生是如來度者設若見有眾生為如來度者是如來見得我能度化即為有我人因我度即為有人度人離塵登我法界即有眾生度人生死不入輪迴即有壽者一念不忘四相畢具所謂平等真法界佛不度眾生者謂何而如來豈有此耶如來既無四相又何有我乎然如來說有我者是對眾生而言即非實有我也而凡夫之人錯認幻相以為有我蓋未能見性所以我相未忘也佛又恐人分別凡夫復呼須菩提言凡夫者似與如來異若論本性真空自在苟能了悟隨入菩提故如來說即非凡夫是假名為凡夫耳然則如來凡夫一而已矣又豈有能度之如來可度之眾生也哉法身非相分第二十六如來清淨法身乃從本性表出即是真空非屬相貌無相可求者也須心悟始得不可以色相見蓋色相總屬幻有所見亦非真實故曰法身非相須菩提於意云何至不應以三十二相觀如來註轉輪聖王是為四天正統攝四大部洲正五九月照南閻浮提二六十月照西瞿耶尼三七十一月照北單越四八十二月照東佛婆提常如輪轉照察人間善惡以治四天下乃二地菩薩寄居金輪王位修行在天人道中未出三界以業報福德亦具三十二相是業力所成也觀與見不同見者觀體之謂觀者應作如是觀之觀以心觀也講前分既言如來無我無我則無相矣佛恐眾生執相之見未除故復問須菩提曰如來容貌端莊具足三十二相汝之意云何果可以三十二相觀如來不須菩提順佛言而隨答之曰如是如是蓋認作以相觀如來徵問須菩提也如來不可以相見可以相觀因此有相以觀無相之妙未嘗不可此答在須菩提不為錯正是他深解進步處但非佛發問意令初發心人聞之不知由無相方能現相但見於相昧於無相未免執相以觀如來誤入邪道故佛轉詰以曉之曰設若如來可以三十二相觀之則轉輪聖王管四天下周流不已以福業多端亦具三十二相興如來相似是轉輪聖王即當為如來矣須菩提深悟佛意即應之曰以我解佛所說義自不應以三十二相觀如來也爾時世尊而說偈言至是人行邪道不能見如來註偈者發言成句又四句為一偈也色顏色見親覩也音言音聲聲氣求索也我者佛自謂此指法身真常清淨之我亦對人而言我也邪道者聲色乃是幻妄惟真性方為正覺如來謂真性法身也講爾時世尊印證解義而說為偈言曰如來之我本無色可見無聲可求若人以色見聲求心遊性外墮于識境是人所行名入邪道決不能見如來矣蓋求我於聲色是以如來為有相也欲見如來者豈可以三十二相為哉無斷無滅分第二七前分既言不可以色見聲求恐人疑如來斷絕諸法消滅形相不知真空妙體無斷滅相故此分又發明之蓋我以不可斷滅一切諸法起箇著無見也須菩提汝若作是念至於法不說斷滅相註具足相即前言具足諸相也說諸法斷滅者斷者不續滅者不生妙性本空如明鏡纖塵不翳任萬形之自起自滅而鏡之明體寂照如如未嘗斷滅若作是念如鏡先自著翳則光拚而有斷滅相矣此蓋我言求菩提者不可念著于無非謂如來不以具足相得菩提為非也講承上文言須菩提汝雖知如來不可以相見矣設若作是念謂如來不用具足色相之故得此阿耨多羅三藐三菩提將必舍去色相別生見解汝切莫作是念而謂如來無形相無聲色遂不以具足色相之故而得此阿耨多羅三藐三菩提心也佛又告之曰汝若作是念云諸相皆無纔發此阿耨多羅三藐三菩提心是說度人諸法一切皆斷滅矣如來雖脫塵緣圓通無相神化無方而隨緣順應原非斷滅者法如斷滅則心性何由發明而真如亦幾乎熄矣汝切莫作是念也此何以故凡發阿耨多羅三藐三菩提心者必依諸法以為修行之路不得說法俱捐生斷滅相也不受不貪分第二十八菩薩所作福德皆般若真空直超彼岸豈比世間布施之福德受而貪之也哉曰不受者一塵不染縱有向何處著曰不貪者心等虗空欲愛從何處生也須菩提若菩薩以滿恒河沙等至是故說不受福德註我者私己之心也成者成就也前於六波羅蜜中揭出忍辱波羅蜜為言可見忍之義大矣哉人於一切萬事執著一箇我心就有四相於六塵上見其可愛而受之見其可欲而貪之便不能忍耐以降伏其心而於菩提遠矣按大般若經有安受忍有觀察忍修此二忍便得無生法忍此處知字是觀察忍成字是安受忍知一切法無我得成於忍便是無生法忍講前分既言不著聲色相不著斷滅相真通達無我法矣佛故呼須菩提而言曰設若菩薩以滿恒河沙等世界之七寶持用布施可謂多而獲福勝矣然未免有貪受之心非自性功德也若復有人深知一切諸法從心而生湛若太虗不住不著都是平等無有我相雖以法施普度而不自有其能得以成就容忍之念則此菩薩無我之功德勝前菩薩寶施所得之功德矣然所以勝之者何以故以諸菩薩心本無我既有法施功德無有我施之心誰其受之惟此不受福德無有邊際故勝前菩薩所得功德也須菩提未解不受之義而白佛言菩薩既如是而得福德宜受享矣云何菩薩不受福德也佛答須菩提菩薩所作布施福德俱本真性無我之法無有我相無有能心本為利益眾生不是為自家受用若起一念受用心便成貪著菩薩修福德不應起貪著心是故說不受福德也威儀寂靜分第二十九如來行住坐臥謂之四威儀寂靜者言威儀中真性寂靜無去無來如如不動也此從威儀中指出寂靜見性無染著無生滅不可認作以威儀為寂靜也須菩提若有人言至亦無所去故名如來註此分三言如來皆謂真性也真性無相若以四威儀形容之是人不解佛所說如來之義理也故名如來者言無去無來乃是如來之實義名曰如來者以是故也講如來法身遍虗空法界無相無所凡其應現是隨眾生業緣而來其實真性自如未甞有去來之迹人見如來應化威儀得母謂既非斷滅落空又非色相落有即是可以觀如來乎是仍在應身上落想而不能於法身上洞徹也故呼須菩提告之曰若有人言如來者若來而應感若去而入寂若坐而跏趺若臥而偃息以此四威儀遂指名為如來則是著於有相徒覩其形容而未窺其真性此人不能解我所如來之義矣其解者何以故所謂如來者不以應化為體以法性為體盡法界一如不動本無來去止因與眾生同體發起悲願度生無量劫來遍修諸行熏成淨業隨眾生心應現救濟謂其來也眾生心淨緣至即現來無所從謂其去也眾生心垢感畢即隱去亦無所是知法身真體絕無來去故名如來耳若顯現而成四威儀不過為化度眾生現出之迹偈迹雖有動靜而性實無動靜豈可執是而言如來哉夫無所從來則非有亦無所去則非無有無之見破盡至是而色見聲求諸法滅之疑徹底消釋矣一合理相分第三十宗泐曰南唐石本新州六祖註本並作一合相理分如來之具足色者相也真性之無去無來者理也無理則相無所攝無相則理無所附必真空之理與外具之相合而為一則表裏俱融精粗無二矣須菩提若善男子善女人至但凡夫之人貪著其事註微塵世界都非實有悉是假名故微塵在世界中游氣飄揚任其起滅世界在太虗中山河大地任其聚散猶如人身煩惱塵心皆逐妄而生也人人身中俱有妄想其微細雜念猶如世界微塵然非本性中物不過影響虗幻而已故云即非是名也一合相者猶朱子云氣以成形而理亦賦之之意一者不可分之以為二合者不可析之以為離謂理與形合而為一相也以如來言應化身中有法身以凡夫言四大身中有真性推而言之大而天地小而萬物有形者即有理非形無以顯理非理無以現形皆是一合相經言一合相止就人身言也世界微塵先以為喻耳塵身假合與塵界假合無異塵界為器世界塵身為有情世界此以器世界列有情世界故從世界微塵說到一合相儒書云人身一小天地即此義也如來說者以佛曾言之也言即非者謂無實也言是名者謂虗名也凡夫業緣中現如來隨緣應化名一合相皆非實也其實而無相者則不可說也不可說者以真性無相不可言說也相即無相凡夫不知貪著相事相乃無相真性所現之形迹凡夫貪戀執著如目見色而愛色耳聞聲而愛聲泥此色身誤認為我故沉淪六道無由解脫此其所以為凡夫也講上文言無所從來亦無所去則知應身全是法身不落有無一見但恐人隨語生解向有來有去處見法身散為應身便謂如來住於異處向無來無去處見應身攝歸法身便謂如來住於一處住於異處則見一切法實有一切法而法不歸如事相不得消亡住於一處則實相不能無相而菩提有法智照不得泯絕彼如來於法界中隨緣應化融通無礙非於一處住亦非異處住故舉世界微塵不實喻法身應化非一非異而結歸一合相以明之佛告須菩提曰若有善男子善女人以三千大千世界碎分為微塵於汝意云何是微塵眾寧為多不須菩提悟而言曰若以世界分而為微塵甚多世尊所以說者其義何耶若是微塵聚而成眾果為實有者人皆知之何須佛說佛即不說是微塵眾也所以說者何碎界為塵妄塵幻聚世人不知故須佛說佛所說微塵眾即非實有微塵眾是虗名為微塵眾耳須菩提又呼世尊而言不獨微塵非實如來所說三千大千世界皆由塵聚幻成至劫數盡時亦有變壞比所以虗而不實即非世界是虗名為世界也何以故若以世界為實有者世界凝合眾塵而成即是一合相而可執為實有哉如來所說一合相則以四大五蘊形質幻成理氣凝聚性相假合非實有一合相是虗名為一合相也佛聞須菩提言已知深悟其理故呼而告之曰是一合相者實而不實相而非相即是不可以言說求之真性在焉但凡夫之人聞諸佛說不能證悟淺則貪著諸塵而成緣競起深則貪著色相而幻境愈增遂繫縛於生滅雜念而不能解脫豈知理相合一即是不可說之妙哉知見不生分第三十一本性原是真空清淨無為真知無不照徹纔起知識見解則所見無非四相便難發無上菩提之心必妄起之知見盡滅不生然後四相之見自然不生而般若真知方露可以證菩提登彼岸矣剩閒曰真性本見不生此言明真性者也要知見不生也須菩提若人言佛說我見至即非法相是名法相註前言四相此言四見相者法所現也見者心所取也然相粗而見精矣四見謂作四相之見三疊言之是佛分別棄身見性之義人無知見即同頑石佛豈無之但知見有真妄耳如法華經云聞佛知見示佛知見悟佛知見入佛知見此知見之真也楞嚴經云知見立知即無明本此知見之妄也王日休曰見者謂實有是見也一泥于實則多所貪著而妄念滋長矣法者事之法也相者形迹也不生法相者於事法之形迹如我人眾生壽者之見皆不萌之於心也如是知如是見者即無上菩提之真知真見也即非法身掃除名相之盡是名法相顯著實相之盡也講前但破相此乃破見見心不破一異分際不除故合破之蓋佛恐人執著妄見障蔽真見不能證悟真性故呼須菩提而問曰若人言佛所說者實有我見人見眾生見壽者見須菩提于汝意中云何是人可能解我所說之義否耶須菩提答曰不也世尊是人口雖能說心非能悟不能解如來所說之義也其不能解者何以故也世尊所說我人眾生壽者之見原是外現假象不是性中真諦即非實有此見也因眾生滯於形迹之私流為物化之累乃假名四見為眾生掃除執相是名為我人眾生壽者爾豈真有此見哉佛因須菩提三疊四見之言分剖明白又呼其名而告之曰大凡發阿耨多羅三藐三菩提心者不但四相宜空即於一切諸法皆是無相識自本心見自本性應有如是之真知如是之真見如是之信受解悟不生一毫法相法相者修行種種之法一泥著則諸相生矣不生則無上菩提渾然天真而在外之形迹皆不是以為累但初修行人不假法相其入無由須菩提凡是所言法相者皆為接引初學令其漸進耳若至了徹真性空寂法相何有故如來說即非實有法相也是假名法相而已夫法相非有必無我人眾生壽者之見而般若真性于此可悟發菩提心者宜審於此應化非真分第三十二分為三節此分明凡應現于事設化于外者究非真實惟本性自如乃為真實此經通章反覆說來總歸到真空無相即自性也本虗空不取于相如如不動二句盡之如如不動乃真空也全經為度生而發故以演說終之度歸無度說還無說非真也須菩提若有人以滿無量至不取於相如如不動註阿僧祇西土之數名猶云無央數耳無量阿僧祇乃積數之極多不可以數計也發菩提心者謂發廣大濟度眾生之心也推明經義曰演宣揚經義曰說如如不動上如字謂真如性下如字謂自如之甚也不動謂不逐相移動也講般若大意上已說完如來欲後人持說此經以傳慧命所以又呼須菩提而告之曰若有人以滿無量無央數世界七寶持用布施其得福可謂多矣然不能離相布施財施雖多福終有盡至於般若波羅蜜經全是法身妙諦一切諸佛及無上菩提法皆從此出只恐人以文字目之不以心持以樂小心持而不以菩薩菩提心持耳若有善男善女發無上正覺度眾之心實信奉持不獨受持全經功德希有於此經中乃至四句偈等不徒受持于己自明其性又為人演說教人亦明其性人己兼成利益無盡其所獲之福勝彼七寶布施者矣佛又言曰我所謂為人演說者汝亦知云何為人演說乎惟不取於相如如不動蓋我與眾生都是色相假合若論真性不著四相不住六塵人法雙忘情智俱泯自無形迹可求亦無聲色可見本來真空何有相之可取惟真如之性無不如意應現但如如焉神通乎法界而定自然妙化於無方而體常寂徧虗空界常住自在初何甞逐相遷移而有所動于中哉此真可以演說矣何以故一切有為法至如露亦如電應作如是觀註法者事之法也有為者有所作為也上自天地化育下至人事造作皆有為法也夢者夢寐也睡時似有覺了全無幻者幻術也如結巾成兔結草為馬之類皆虗幻不實泡水泡也外像雖有其中實無影形影也光射則有光滅則消露者露水也朝濕則存日燥則乾電者閃電也忽有忽無速于交睫如是二字指上六者而言講佛又自申說云我所言不取于相如如不動者何以故乎蓋本性真空無相原自如如無所作為者也故凡聖賢皆以無為為法而親證之若有所作為便虗妄不實是以世間一切有為之法皆如夢寐之非真如幻術之假化如水泡之虗浮如身影之恍惚如朝露之易乾如閃電之易滅當作如是六者觀看可見世間之事諸行無常有生有滅非真有也惟如如不動之性湛若太虗超萬劫而常存歷千變而不易與之演說其福德寧有量哉佛說是經已長老須菩提至皆大歡喜信受奉行註此段乃阿難之記詞結經常規所謂流通分也流通者流通般若利益眾生如水之不壅塞也比丘比丘尼者出家之男女二眾也優婆塞優婆夷者在家之男女二眾也天人阿修羅六道中之三道也經初但云與大比丘眾今言四眾八部顯前說經之初非不在會也凡所聞歡喜必妙契於心契則信之真受之切而奉行不虗矣講阿難因佛反復闡明般若之法遂記而言曰我佛說經已畢首焉啟請之長老而名須菩提者頓悟真空默領心印其時同會之聽法者則有比丘比丘尼焉優婆塞優婆夷焉一切世間之人天上之天人並阿修羅神聞佛所說此經各人言下見性不驚不怖不畏皆生大歡喜幸正法之得遇莫不信受其言而持之於心奉行其教而演之於人雖歷億萬劫永證菩提而人己兼度矣此正我佛慈悲廣作津梁以度羣迷者為功斯世豈有量哉
