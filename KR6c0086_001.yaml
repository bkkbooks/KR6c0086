body:
  text: 剩閒居士龔穊綵注蓮舫居士扈正智校法會因由分第一法者即大乘法也會者佛與諸弟子共會於祇園也因始也由行也行必有所始此法會者乃作經之因由也如是我聞一時佛在至收衣鉢洗足已敷座而坐注如是者指此經所言之法也我集經者自謂即阿難也言如是之法我親從佛聞之一時者師弟會遇說此般若之時佛者覺也自覺覺他覺行圓滿故名曰佛此指釋迦為一曰教主也舍衛國梵語舍衛此云聞物即波斯匿王之國祇樹王之太子名祇陀此云戰勝生時適值戰勝因以為名樹是祇陀所施給孤獨園者王之宰臣名須達多一作孥常在此園賑濟孤獨達多原是外道因在護彌長者家聞佛說法心生敬心欲得勝地請佛住思太子有園方廣八十頃空曠清淨堪為福地往白太子太子戲曰若布金滿園吾當與之達多如其言太子亦不愛金將金共立精舍請佛說法比丘梵語華言乞士謂上乞法於佛以明己之真性下乞食於人以為世人種福即今之僧也大比丘乃得道之深者天人所共恭敬非小德故內外教典無不博通非寡解故蓋佛將說真空無上妙理必得道之深者方能請問領悟也千二百五十人皆佛所化度弟子常隨聽法者俱皆在也爾時彼時也世尊舉世之人所尊敬也食時乞食時非受食時乞食當辰巳受食當午時也著衣著僧伽黎即二十五條之大衣制像水田見生福故佛制入王城聚落應著此衣猶今之搭戒衣也持鉢持四天王所獻之鉢過去維衛佛鉢入涅槃後供龍王宮中釋迦成道龍王送至海水上四天王取以奉佛此是紺琉璃鉢乞食時持之次第乞平等行乞不分貧富貴賤也本處即祇園也飯食訖此飯字作餐字解指受食時言訖畢也洗足西域行露足故以水滌去塵垢已完也敷布也布列高座而坐即今之止靜打坐將說法也講阿難記而言曰如是經之所言乃我親從佛聞之佛說此經時在舍衛國給孤獨園中與得道之大比丘及相隨聽法之衆千二百五十人俱同處焉爾時世尊於日當辰巳可以乞食之時著僧伽黎大衣持紺琉璃鉢園在城外入舍衛城中次第行乞不越貧以從富不捨賤以從貴大慈平等無有選擇乞食既已還歸園中當午受食飯食事畢將入禪定於是收入衣鉢使心無係纍洗足以潔其身乃布座而坐說法之因由起矣善現起請分第二分為二節善現須菩提之別名當世尊趺坐之時正弟子請益之候故身起恭敬而請問也時長老須菩提在大衆中至云何降伏其心注時須菩提起問之時衆弟子中惟德尊而年高者謂之長老須菩提一名善現又稱空生尊者初生時其家一空相師占之唯善唯吉故名善吉偏半也袒露也所著之衣半露其右肩東土以袒為慢西方以袒為敬表請無上正覺之法以身擔荷也右膝著地右是正道左是邪道亦表請正法從實依歸卑禮承受也合掌恭敬東土以拱手為恭西方以合掌為敬兩手相合肅恭而身不懈一心專注誠敬而容不息也白啓問須菩提向佛啓問而言已上七句皆集經者敘說也希有言曠劫難逢千界一佛世所希有讚佛之詞如來佛之通稱猶華言聖人如而不生來而不滅即真性之體用以立名也護愛護念存念付付授囑囑告菩薩本云菩提薩埵略其文而便於稱故云菩薩菩提華言覺悟薩埵華言有情覺有情者衆生多有情欲而不能覺惟菩薩在衆生有情之中自能覺悟而不染又能覺有情衆生而化導之也諸菩薩諸衆也指凡學于如來者阿謂無耨多羅謂上三謂正藐謂等菩提謂覺謂無上正等正覺即指真心言也此心包含太虗孰得而上之故云無上然上自諸佛下至蠢動此心正相平等故云正等其覺圓明普照無偏無虧故云正覺云何猶如何請佛言之詞應當也住止也降伏者制禦之謂也講須菩提在大衆中即從自己座位起身整頓威儀袒其右肩以示不敢背乎師屈其右膝以示不敢左乎道合掌以示其歸依恭敬以示其嚴肅而啓白於佛以伸問辭先稱讚曰舉世所小有者我世尊也又曰如來起慈悲心善能衛護眷念此會中之衆菩薩使之信受善能以此佛法付委囑託此會中之衆菩薩而使之奉行又問曰世尊若有善男子善女人學道之初發此阿耨多羅三藐三菩提心者云何為當常住而使之不退轉至於妄心一起當以何道降伏而使之不惑亂我真心也佛言善哉善哉須菩提至唯然世尊願樂欲聞注重言善哉讚歎之詞諦審也仔細聽也應當也如是二句一云說在下二分此但引起而使審聽之詞是看得太虗止知照下者有以為頂上文謂即此便可以住即此便可以降伏即指發菩提心為印可之詞是看得太實止知承上者竊以如是二字虗中帶實上承發菩提心來實中尚虗下照度生布施去方是語脈夫照下引起人所易曉頂上處不可說得太盡有礙下文也唯應辭然者然其使已諦聽之言有以為如儒書曾子之唯一貫者看得太深也願心所期樂心喜好欲心思得謂心期喜好思得聞住降之詳也講佛因須菩提請問妙稱佛心故重言善哉善哉以歎美之遂順須菩提之言而云汝以如來善護念善付囑此善發我未發之言汝當詳審而聽吾當為汝說此應住降伏之道人之菩提覺心雖本來固有然物欲陷溺攻取日衆最難發起者若善男善女既發此心當如是安住如是降伏其妄心須菩提即因佛言又稱世尊弟子願欲聞其說也大乘正宗分第三大乘者言非小乘也佛法有大乘小乘如儒家大學小學菩薩用此大乘法化導衆生猶車之載物運量有甚大也宗者心之所主正者言正而非邪也佛告須菩提諸菩薩至衆生相壽者相即非菩薩注諸菩薩摩訶薩佛呼在會之衆也摩訶大也大覺有情即能救度人者如是指下文所告也衆生者謂凡有生之類上自諸天下至人物衆生雖多約有九種若如也卵胎濕化有色無色有想無想非有想非無想也我者對衆之稱代度生菩薩設為自任之詞非佛自謂也皆盡也令使也入者入於其中無餘外更無有餘大涅槃一切修行者之所依歸蓋指本來清淨真空心境也滅消滅滅盡一切愚癡煩惱度化度度脫生死苦海菩薩心平等普願與一切衆生同入無餘涅槃也量限量數數目邊邊岸無量無數無邊邊之極言其多也相者形迹執著此形迹心不虗空滯而不化謂之有也我相者認四大以為己有而成我相人相對我而言衆生相則凡有生者皆是壽者利長生不滅有悠久之義講佛告須菩提說諸大菩薩以妄心欲其降而使真心安住者果何道以致之凡人一身悉皆五陰六識遮蔽我之真性故與一切衆生交接感我妄心時難降伏何以見之有性易輕舉飛揚浮動或由軀殼而名卵生者有識常流轉習氣深重或由胞衣而名胎生者有心隨邪見沉淪不省或感濕氣而名濕生者有情逐景趣遷流起幻或隨變化而名化生者有執相修因著色見者名為有色有寂守空頑著無色見者名為無色有滯諸聞見係念染著者名為有想有絶念不起致虗守寂者名為無想有起生滅見落有無兩頭機者名非有想非無想凡此九類衆生迷真逐妄種性不同相因性起妄心建立隨類受生若天若人若物虗空等神陰魔等鬼沉溺世趣流轉生死下自欲界上至諸天輪回六道難入涅槃者也以妄感妄動我妄心起分別見致難降伏今我即發平等正覺心則衆生本心與我心無二皆令消融其煩惱點化其染著覺妄悟真破愚癡見息無明火入於清淨無為涅槃妙境而滅度之如是滅度無限量無計數無邊際一切衆生豈真有衆生使入涅槃而滅度之哉蓋衆生原有此菩提心只為迷而不悟遂生種種妄相今令心地一朝豁然開朗種性悉化頓見本性空寂是乃自性自度本來無此衆生何得而滅度之夫實無有衆生得滅度者此何以故蓋自性本空無有我人衆生壽者之形迹是為無上菩提心方是大菩薩若或有此四相則於前一切衆生妄為分別心生邪見起諸煩惱安得皆令滅度以至涅槃哉即非菩薩地位中人矣妙行無住分第四分為二節妙行謂修無上正覺精妙之行無住者不拘泥執著精妙之行本無住著也復次須菩提菩薩於法至不住聲香味觸法布施注復還也次再也還再與須菩提言敘經者之詞也宗注次坐次也須菩提先于座起跪而請問至是使還坐而告之復次二字佛言也須菩提呼而告之也亦通録為旁參於法之法槩指佛法言觸法之法屬意分別思想皆是布普也施捨也色聲香味觸法為六塵眼耳鼻舌身意為六根眼入色耳入聲鼻入香舌入味身入觸意入法為六入觸者來加于身如飽暖安逸者妙觸也勞痛饑寒者苦觸也法者即意之所舉計校分別是非之類當于義理者善法也動于情欲者惡法也住者即住于根塵而執著不化也不住布施如以色施人而不存施色之心聲香等亦然講佛再與須菩提說菩薩於一切所行之法當無所執著即行於布施言以色布施不著於色聲香味觸法皆然蓋凡夫貪著借布施種福此為住相布施著在物上菩薩行施了達本空不住色聲香味觸法而施無留滯執著應當也菩薩行施理當如是也須菩提菩薩應如是布施至菩薩但應如所教住注相即六根六塵之相福德乃性中之福德佛恐人疑不住相則落頑空故言福德以喚醒之福德無量福報亦無量佛止言福德者菩薩但修福不望福報也不可思量言其廣大不可以心思度量其多小也於意云何言汝意中作何理會也四維四隅也如東南方西北方之類東西南北四維上下總謂之十方虗空者太虗之中無有纖毫隔礙蕩然空明非心思可能量度佛以福德不可思量故舉十方虗空為喻虗空豈可思是故須菩提皆言不也語畢而呼世尊者敬之至也虗空而該以十方者是虗空之全體即非頑空也如是指上文虗空也講佛又呼須菩提而言菩薩自當如是布施不住於相何以故若學道的菩薩不泥著色聲香味觸法之根塵以為布施則喜捨心空圓滿其福德量等虗空豈人之心思可得而測度忖量哉又問須菩提於汝意中自謂如何如東方虗空可以心思度量不須菩提答云不可思量更問南西北方四維上下虗空可思量不須菩提亦答云不可思量蓋大莫大於虗空非人之所測度佛又明說無住相布施之福德亦如虗空之不可以思量也既而佛又呼而告之諸菩薩之學道者不必別處更求應住之下落但當依我所教於汝無住相布施之法便就此止應用存養之間湛若十方虗空無所住而住可也如理實見分第五分為二節凡人之形色皆屬虗妄非真實也所見非真見也惟此如如之理乃人本性是為真實不以目見而以心見不求相見而求理見是為實見也須菩提於意云何至如來所說身相即非身注此如來謂真性佛湛然常住本無生滅無相之可見者也身謂色身相謂諸相即非身相謂色身與諸相皆非真實也講佛語須菩提曰我謂學道菩薩如所教住而無所別求者蓋以如來不可以形迹求也於汝之意云何可以有形之色相即見如來不耶須菩提解其意乃答曰不也世尊不可以身相得見如來何故不可以身相見之蓋如來所說身相不過形體假合之末耳豈可謂之實有身相而見真如來哉故曰即非身相也佛告須菩提凡所有相至若見諸相非相即見如來注謂之諸相不止身相凡法相非法相皆在其中而心不執著則見諸相非相此如來指法身也講佛告須菩提曰夫如來既不可以相求可見世間凡有形相者皆是假合的不是本有真實的雖有形相亦虗妄耳汝若能見一切諸相便識破非真實本相自無執相迷真之失即能回光返照見法身真性如來隨處顯現矣正信希有分第六分為二節學道以信為本大乘法無住無相乃是正宗聞之而不疑懼故為正信此人不可多得故為希有須菩提白佛言世尊至得如是無量福德注白告也頗略也章章分句句讀實信真實信心也如是言說章句指上三四五分之辭與無住行施無相見佛之說後五百歲者大集經云有五箇五百歲初五百歲解脫堅固第二禪定堅固第三多聞堅固第四塔寺堅固第五鬭諍堅固經云後五百歲指末法鬪諍之時亦有持戒修福之人持戒者諸惡莫作修福者衆善奉行根者有生長之義一念生淨信專一其念而無染著是名淨信也福德兼慧而言世間所享者福報信此經者名福德言有福又有德也講須菩提深信佛所言說恐後之人聞法不能信受乃白佛言世尊所說皆大乘正宗之教菩薩未有不信受而奉行者但大凡衆生頗有得聞如是不住行施真空無相之言說章句果能實信之不也佛告須菩提汝莫輕視衆生作此生實信不之說蓋不住真空妙理人心所固有但為六塵四相所蔽而昧之耳必有大根器的善人自能信任其道即至如來滅後到後五百歲之時斷有持戒修福之善人能於此經中之一章一句信之於心以為真實語當知此人之善根培植甚厚豈止於一佛二佛三四五佛而種此善根哉已於無量千萬佛所中凡世間一切利物濟人之事無不行之而種諸善根發生得此實信心來非淺根人所能得也若有此善根之人得聞此經之章句乃至一念之中淨而不亂信而不疑不此淨信心者如來盡能證明而知之盡能攝受而見之是諸信心者雖名為衆生其淨信所得福德受用不盡豈有限量哉何以故是諸衆生無復我相至法尚應捨況非法注第一何以故言淨信福德在無相第二何以故言所以無相之故第三何以故侗人云疑衍此釋生信得福之故該乎生法二空無四相生空也無法相無非法相法空也我人衆生壽者盡天地間之相不出乎此非法者無法也淪於頑空取猶執也心取相者此中不化未悟無相之理而欲執相以求是有外障故云即著四相法相雖非色相之比然一有所取亦不悟真空體而起內障故亦云即著非法原不離相況執之乎著四相者即非菩薩故必無取無著方合真空所以不應取之故如來常有如筏之喻也講佛言是諸衆生何故得如此之福德彼一念生淨信其實善根純熟能合真空無相之理無復有我人衆生壽者之四相亦無有執著此經之章句落於有見而為法相亦無有不思去探討其言沉空守寂落於無見而為非法相也不著有無兩邊復其真空之性諸相盡捐心無染著所以淨信此經而福德無量佛又反言之此何以故也假使是諸衆生若心不空取有形相即為牽著我人衆生壽者之形迹矣豈能使心性空明隨機感應乎此人之所易曉也至於我說無法相者以本空真體不在言語文字之間若取法相就是與前執著四相之心一般至於非法則無相矣我亦謂無非法相者蓋真性中諸法顯現無容一毫染著原不相礙若取非法相謂之無記空斷滅見此心不化與前著四相又何異焉是故法與非法兩頭見至須截斷不能執為有而取法亦不應執為無而取非法以此不應取之義亦有原故如來嘗謂汝等學道比丘當知我說此法皆因汝有四相不能了悟真空超登彼岸是以假此法令汝度脫生死苦海耳汝若既見本心證涅槃樂即我所說之法亦當不用猶如編竹成筏渡人過水到岸則不須筏矣夫法尚當捨去何況著無非法又安用執取為哉無得無說分第七無上菩提之理本來無相當體空上無物可得無言可說也須菩提於意云何至皆以無為法而有差別注耶者疑辭亦詰問辭也菩提心是如來本性亦人之所同具豈自外而獨得有待言而顯哉定者泥於一處而不通也非法則不有非非法則不無非有非無乃極至之理也所以以字承上來皆以以字用也無為法即是無上菩提之別名乃自然覺性不假人為者也或云有為法世間法也無為法出世間法也要之皆以無為法而有差別則有為亦本于無為分箇有無所謂差別也世人多以無為二字認作灰心槁形一無所為此真愚見也得道淺者為賢得道深者為聖指現成者言差別不同也又參差分別也按差別差字有二音一初牙切音叉一初宜切音雌考古本注原讀作叉不同也後有讀雌者參差也就賢聖淺深說當作參差就有為無為說當作不同然不同中具有參差義則二音皆可通讀不必拘也講前章既云不應取法當如筏喻猶恐須菩提未透徹故又設問曰汝之意云何如來無上菩提法果有所求而得之於己耶抑以此法有所說而教之人耶須菩提云如我心中悟佛所說之義則知無上正等正覺之法亦強名耳求之了不可得本無定有之法實此名也即如來所說但為覺悟衆生隨機設教不得已而有言亦無定有之法如來可據而說也如來之法無定名亦無定說者其故何也蓋如來所說者無上菩提法也可以心悟而不可以相取一有取心則馳於外求可以心傳而不可以言授一有言說則泥於文辭皆不可也是法也若執以為法微妙莫測有而不有法何所在非法也若執以為非法隨感即應無而不無何在非法又非非法也而謂可以定名定說歟所以然者何也法本於無惟無故妙也此一切賢聖雖先後遠近之不同皆不能外無以為法但所見有淺深作用有隨機而差別不同耳依法出生分第八法者即此經之法指般若波羅蜜多言依者不違之謂諸佛一切妙法盡依此法出生也須菩提於意云何至所謂佛法者即非佛法注三千大千世界者世為遷流界為方位界限過去未來現在為世東西南北四維上下為界三千大千統言一大世界形容其多也布施廣布捨施也七寶者金銀琉璃珊瑚瑪瑙珍珠玻璃也寧為猶可為乃計其多而故問之辭四句偈諸解不一或指經中二偈或指無我相四句須知佛止說偈不專執一金剛經乃大藏經之要勸人受持四句偈或顯實相或明妙法又經中之要執一廢餘便失經意此經自始至終總談真空無相妙理人能體會此旨一卷中精功成文者何處不有偈者發言成句也四句偈而曰乃至曰等者自多至少之意不止四句為偈也要活看乃至字等字餘詳廣録講須菩提固知無相之理但不知得無量之福佛將以此持經功德開示學人故先設言呼須菩提而告之設有人充滿三千大千世界之七寶用以布施此人所獲福德多乎不乎須菩提會意答云人以七寶布施寶豐福勝其福德甚多誠如世尊之言也何以故是福乃有相之施於性中真空無相之理全不相關初非性中自然之福德也所以如來說福德多耳蓋是假合故見其多也佛言若有人於此經中之言直下承受而不忘拳拳奉持而不厭乃至由博而約於四句偈等為人解說其義則是自利利他不特覺一己之性並覺衆人之性將見人己兼成所獲之福勝於彼之七寶布施多矣然所以勝彼者此何以故也蓋般若真空無相之理是諸佛之本性一切諸佛之多及諸佛無上菩提之法皆自此經流出求其直指全體未有若此經之明且盡者佛又恐人泥於佛法又呼須菩提而曉之曰所謂佛法者本來無有不過假此開悟衆生使之言下見性乃名為佛法也故曰即非佛法隨掃以顯般若真空耳一相無相分第九一相者謂修行四果各有一相也其實功有次第而無為則一果雖深淺不同而總不可萌有得之心當深造以悟入無相蓋須陀洹等皆是假名究竟本來一相亦無須菩提於意云何至而名須菩提是樂阿蘭那行注梵語須陀洹此云入流入聖人流也而無所入者不著入流之相也我者指須陀洹等言梵語斯陀含此云一往來謂前念起妄後念即止前念有著後念即離妄念往來於心中往則妄念止時而又或一來本性未能寂滅故也梵語阿那含此云不來不來欲界亦名出欲外無欲境內無欲心謂已斷欲界思惑也梵語阿羅漢此云離欲其心已證無為之體諸漏已盡自無生滅果如樹之結果謂到此地位道者得無相之理非徒果也又須陀洹果者煩惱不生決定不入地獄異類是名初果如果之初生者也斯陀含果者色身只一次往來天上人間如果之方碩者也阿那含果者欲習永盡決定不來欲界受生如果之將熟者也阿羅漢心境俱空內外常寂法實無有豈作得道念如果之已熟者也梵語三昧此云正定亦云正覺樂受也梵語阿蘭那此云無諍萌於心曰念見於事曰行謂其無人我見而不起諍行也實無所行者本性空寂隨緣赴感而實無行之之心也講佛問須菩提曰須陀洹作箇念頭自謂我必得此果不須菩提知其不然乃曰須陀洹不萌得果之心何也蓋彼已超乎凡見心趨無相之理得與聖人之流而無所入於聖域之想惟克制其欲不入六塵境界須陀洹之所以得名者其在是歟佛又問曰斯陀含作箇念頭自謂我必得此果不須菩提即不然之云斯陀含心已造到至靜之地但目覩諸境未能不動此心還有一生一滅而無第二生滅前念方著後念即覺不久于人欲雖往來于人間天上名一往來而實無往來也是斯陀含之所由名歟佛又問曰阿那含作箇念頭自謂我必得此果不須菩提即不然之云阿那含心空欲念已斷塵界思惑外不見有可欲之境不來欲界受生名為不來矣夫曰不來是此心尚未融化猶有強制之勞而其實無不來之迹蓋不惟六根清浮且見得六塵本空此已造到佳境矣非阿那含之謂乎佛又問曰阿羅漢作箇念頭自謂我得這箇道不須菩提知其不然即不之曰阿羅漢亦是假名佛法本空實無有法名阿羅漢也設若阿羅漢作得道之念是所得心猶未除即著我人等四相矣豈足稱阿羅漢哉須菩提又拈出平日所得佛說而證之曰世尊佛昔日曾說我須菩提一念不生諸法無諍得此三昧諸弟子中許我為第一必定是我脫盡人欲方許我為離欲阿羅漢世尊雖許我為離欲阿羅漢我則不作是念我是離欲阿羅漢又恐大衆不知去所得心故呼世尊詳言曰我若作此念而必欲得阿羅漢道則又生一妄想安得六欲頓空世尊即不於大弟子中說我須菩提是好樂寂靜之人有是無諍之行也以須菩提外雖有所行而中實無有所行之心方才名我須菩提為樂阿蘭那行也莊嚴淨土分第十分為三節莊嚴者盛飾也淨土者清淨世界即佛國土也此在境上說心地清淨成就莊嚴心地不清去佛土還諸菩薩於自性中湛然清淨心無係纍自有莊嚴境界此在心上說佛土由心建立故菩薩事心下事土成就莊嚴心而土自無不淨兼此三義方全佛告須菩提於意云何至於法實無所得注如來佛自謂昔前也然燈佛即定光佛其佛生時身光如燈故名然燈乃釋迦佛授記之師有所得謂有所得之法也講佛以諸菩薩雖聞四果俱無所得之言而有得心未除猶疑佛法非無執於有法可住故告須菩提曰於汝意中云何我當初於然燈佛處聞法聽受成無上道果然有得於本師之法不須菩提答曰不也世尊如來雖在本師處聽法不過自悟自修因師開導成就無上菩提其實何曾有法可得以為祕授師傳也須菩提於意云何至應無所住而生其心注莊嚴以境言莊端正裝飾也嚴齊整謹飾也以心言真性不亂曰莊邪妄不入曰嚴佛土以境言謂佛世界以心言指本來心地謂之佛土者佛心不失本來能全心地猶之儒家言道歸之聖人耳五行土居中央出生萬物心居中道出生萬法故以土喻心又一世界中必有一佛設化故世界亦云佛土即非者遣掃之詞是名者權立之義或曰即非無二解是名有兩義一曰虗有是名耳一曰乃所以名也宜隨文會之剩閒曰即非是名義相呼應經中用此文法甚多皆是遣掃權立義用即非者從虗有是名單用是名者從來所以名金經以破相顯真為宗遣掃權立是為正義解經者有以即非為指實相如即非身相謂非身相乃真相也是從即字逗斷將非字連下作轉指義是名作乃所以名解經中作是解者亦甚多是即非亦有二義也細體經文是遣掃為當蓋即非是破相破相正以顯真妙在不明言先德云使人自領會方親切耳解為轉指者用意太深說似微妙反掩經義蓋指明道破如同嚼蠟下文重重徵詰皆不必矣須知相即無相直至一合理相分方明從前皆是遣掃未曾點破也諸菩薩指修行者言摩訶薩廣大之稱應當也如是二字指下文所言無所住者不住著在一處執滯不化也講佛問須菩提曰法既無得於汝意中畢竟云何我思菩薩所住之處謂之佛土菩薩於佛土果有意作善緣福業必期相好莊嚴不耶須菩提深解佛旨據理以答曰如謂菩薩莊嚴佛土者其說不然也世尊此何以故蓋菩薩莊嚴佛土不在外貌形迹間也若以七寶宮殿五采棟宇之類始為莊嚴佛土幻成莊嚴不實即非莊嚴是虗名為莊嚴耳菩薩豈著意莊嚴佛土哉佛以須菩提能領佛旨隨順其詞而語之是故須菩提菩薩莊嚴既不在於外飾則當內求於心夫心本清淨也知誘物化而心不清淨矣乃既知佛法無所得又知莊嚴非莊嚴此無取無著清淨心也諸學道菩薩當如是湛然常虗而不染寂然常定而不淆以生清淨心不當住在形色上生心亦不當住在聲香味觸法上生心一有所住便為六塵所縛妄念旋起不能清淨矣須知清淨心妙圓周遍不泥方所本無所住也當於無所住處而生其心如明鏡當前物來悉照物去即空自然心地清淨不拘方所斯真莊嚴也若佛土世界莊嚴皆是假果假說幻相耳何足計哉須菩提譬如有人至佛說非身是名大身注須彌山王者以此山在四天下之中為山之極大者故名山王謂在衆山之中而為王者也高廣三百三十六萬里日月繞山而行以為晝夜由此而分四面為四天下其上有三十三天可謂至大矣以此喻人身之大不過假說其詞如七寶滿三千大千之類講佛呼須菩提語之曰譬如有人焉其身如須彌山王汝意中云何可以為大不耶須菩提深悟佛旨答言身如須彌山王誠大矣然此大身何以有是大也若以色相身言寧有是大佛所說者非色相之身是乃名為大身也無為福勝分第十一無為法也福勝言修無為之法其福勝於河沙世界之七寶布施也蓋持經功德人己俱利不假施為此無為之福比他有相布施之福為尤勝矣須菩提如恆河中所有沙數至而此福德勝前福德注西土有河名曰恆河從阿耨池東流出周回四十里佛多在此說法故取以為喻弟子所習見使易曉耳沙等恆河倒裝文法謂恆河如沙之多也講佛以衆人所易見者先設問須菩提世間物數莫不有多寡如恆河中所有沙數其數難量設使恆河之數如沙等于汝之意所云如何是諸恆河中之沙數寧為多不須菩提答言甚多復呼世尊言但諸如沙等之恆河尚且多而無盡數何況河中之沙其為數也又安有盡哉佛謂須菩提我今以真實之言告汝若有善男善女以七寶至重之物充滿爾所謂恆河沙數三千大千世界用以布施與人所得之福果為多不須菩提即以甚多答之而又呼世尊以證之意以如此布施得福豈有不多之理但不知世尊以為何如耳佛告須菩提曰汝以七寶布施者所得之福遂為多耶若有善男善女於此經中乃至四句偈等信受于心會其義堅持于心存其理則是內見真性己不為業識所迷又能為他人解說使聽受之能亦信而不疑持而不失心地開朗有悟明真性之漸久之善根皆熟可脫輪回成無上道則人己兼益其福即無為福也所受福德視彼七寶布施者真勝多矣尊重正教分第十二正教即無為法以此為教是為正教佛以菩提法立教皆是盡性至命之理正大無邪之論人能尊崇而敬重之明心見性了悟真空為受持正教天人皆生敬重復次須菩提隨說是經至即為有佛若尊重弟子注隨說者不論前後心無分別任所在處不拘凡聖見人即隨機化導而說是經也當知此處者謂說經之處天者天道如四天王之類人者人道即世間之人阿修羅神道此云非天以其果報最勝者鄰次諸天雖近享天福而行非天道也修羅有胎卵濕化四種化生者能攝持世界勢力無畏與梵王帝釋及四天王爭權此類嗔性最重然却能為佛護法胎生者屬人趣卵生者屬鬼趣濕生者屬畜生趣大槩以嗔恨心重托生神道而果報不同耳六道中不言地獄餓鬼畜生者以三種為業識昏迷苦報障重不知經理也塔者藏舍利之地廟者設法像之所皆世人敬佛之地對文曰讀背文曰誦學居師後曰弟解從師生曰子或云以父兄之禮事其師故名弟子講佛復謂須菩提云有人隨說是經或半部或一章乃至最少如四句偈等因文顯義令諸聽者除迷妄心悟真空理當知此說經之處一切世間天人阿修羅皆應以華香纓絡幢幡寶蓋恭敬供養如佛之塔廟殷勤瞻禮也夫隨說者非全經也而感動天人等恭敬供養已如是何況有人于全部經典盡能以心受持以口讀誦會通其文研窮其義須菩提當知是盡能之人深體無相無住之理不離當念真能成就最上而無可加第一而無可比絶無而僅有之法其當為天人供養又何如耶不特持誦能感動而已若是經典所在之處即為有佛不待外求經在是佛即在是而大弟子亦在是宛然三寶共居焉人可不信受奉持也哉如法受持分第十三分為二節如法者當如般若之法受持者承受行持受之于佛持之于己也前言真空無相尚未闡明如何受持此分明言名為金剛般若波羅蜜則信受而持守者有據所以教當依此法而受持之也爾時須菩提白佛言至即是非相是名三十二相注微塵空中飛塵即紅塵也積塵成界析界為塵大而世界小而微塵皆幻妄不實故云非微塵非世界皆假名也三十二相乃佛之正報色身有三十二件好處如眼耳口舌手足豐滿潤澤勝妙殊絶形體端正光明映徹非是愛欲所生是從三十二行得逈異流俗然凡所有相皆是虗妄也講時須菩提疑情釋盡又聞所說受持讀誦得成最上之法歆慕向往但未知命名之義受持之道當何如耳故白于佛而問曰世尊所說此經當以何義命名我等弟子當以何道奉持佛答是經名為金剛般若波羅蜜蓋智慧如金剛堅利能斷六塵煩惱直至諸佛彼岸以是名字汝當奉行而持守也至究其所以之故即我所說般若波羅蜜亦非實有般若波羅蜜也妙明本性湛若虗空寂然無相惟恐人生斷滅見不過假此以導衆生持守是名為般若波羅蜜也又恐執著虗名不悟本性如來住世普度羣迷到處為人開示其實般若乃無上菩提法心法也在自本性中非言語文字所能了者故呼須菩提問曰於汝意中云何謂如來設教有所說法不耶須菩提答云如來設教原是隨機化導令人自性自悟無容外求於法實無所說亦無可說也佛又呼須菩提言曰最大者莫若世界最細者莫若微塵於汝意所見又云何試觀三千大千世界中所有微塵處處布滿果為多不須菩提答言世界固多微塵更多甚多世尊佛因須菩提甚多之對恐其泥于有相又呼而告之諸微塵者原是幻妄之物如見雨則為泥遇火則欲灰本無定體如來說非實有微塵也是虗名微塵而已若人識得非真則太虗澄徹所謂在塵離塵者也不特微塵假而世界亦虗如山之高水之深可謂大矣然山有時而崩水有時而涸劫盡必壞非真有世界也是虗名世界而已若人識得是假則心地朗然所謂在世離世者也佛又問須菩提世界微塵俱屬幻妄汝已知之至如來色身有三十二相為人所不能及不知汝意云何凡欲見如來者果可以此三十二相見如來不須菩提答言三十二相佛之色身也若以相為可見如來不也世尊不可以相見如來者此何以故蓋如來說三十二相者雖勝妙殊絶不過色身耳非真相也是名三十二相假名也未有終不壞者豈可以相見如來乎須菩提若有善男子善女人至為他人說其福甚多注七寶布施外財也身命布施內財也外財易內財難身命而至恆沙之多難之難矣然不脫有漏之因未明本性若受持經偈直趣菩提為人解說使知各人自性俱有般若波羅蜜法則視捨身布施之福豈不甚多哉講佛又語須菩提曰世間所重者莫過於身命若有善男善女以恆河沙等身命之多不惜而以布施凡可以利天下者無不為矣其所獲福視寶施之福尤勝但不明本性時有為頑福耳若復有人于此經中乃至四句偈等受持于己而不失教誨于人而不倦則自悟悟人人己兼利獲福無量較彼捨身布施者不更多乎此金剛般若波羅蜜法所當奉持者也離相寂滅分第十四分為四節此分是說佛之寂滅真性乃真相之離相者離有為相寂滅者不住相不生心也若人能離却諸相則心無所住而一切妄念息皆不生直下頓空即證金剛般若無上菩提返歸寂滅矣爾時須菩提聞說是經至是名第一波羅蜜注深解者大徹悟也義趣義理旨趣義乃名中之義趣則義之指歸處也涕淚皆自目出如雨滴曰涕如水流曰淚有聲無淚曰悲無聲有淚曰泣慧眼智慧眼也是經者文字般若也實相者實相般若也生實相般若現前即顯自性也凡所有相皆是虗妄則真空自性為實相矣道修曰功見性曰德心不疑曰信悟禮義曰解領納曰受堅守曰持如是如是者謂言當于理而印可之也驚者疑其言之過怖者恐其道之高畏者懼其行之難波羅蜜有六種一布施二持戒三忍辱四精進五禪定六智慧疏鈔以第一即布施然六祖云摩訶般若波羅蜜最尊最上最第一斷乎以般若為第一也講當時須菩提一向在實相上用心所以法見未忘聞佛說是經名方知實相即是非相凡聖情盡人法雙忘一切相離無非是佛境界心中深悟解得此義之趣自傷得聞此經之晚乃涕淚悲泣而白佛言世間所少有者我世尊也今日說此深奧經典我從昔來已證四果所得智慧眼善能聆悟未曾得聞如是之經何幸今日聞所未聞耶世尊我聞而信不待言矣但恐能信者少耳若復有人得聞是經信心清淨發一念篤信之心其心純是天真毫無欲塵所染便是清淨般若慧光從文字般若即悟自悟實相般若而真實不虗之相從此生矣當知是人現前已能成就第一希有功德而非尋常之功德也蓋這箇得聞便是聞慧清淨這箇信心便是思慧清淨這箇實相便是修慧清淨皆自心功德即諸佛之所修為故云第一希有也然雖生實相不外無生所謂實相者不可執以為相本無形迹即是非相若說無相恐成斷滅故如來說名實相亦是假名耳世尊如是經法最難信解如我輩親見如來得聞此經信其言之實解其理之妙聽受而持守之不為難事若至將來末世後五百歲去聖時遠五濁惡世魔強法弱之際其時倘有衆生得聞是經亦能信解受持是人真第一等人而不可多得者此人何故不多得也以其信解能悟真空已無人我四相而得人空所以能無四相者何也以解我等四相即是非相人我兩忘衆壽盡泯原無有法可得而證法空此又何以故不惟但解法空而又解得一切俱空之非相大凡衆生不能同佛為六塵染著拘拘形相故耳若離一切諸相其心空寂無異諸佛覺地即與諸佛齊名可也寧非第一希有也此正當機深解義趣處故佛為之印可曰如是如是謂其言當于理而深契佛意也且不惟信解受持為第一希有也若復有人但得聞是經而不驚疑其言之過不恐怖其道之高不畏懼其行之難此人亦甚為希有何以故此雖信有淺深而信佛說之第一波羅蜜則同也然如來所說第一波羅蜜豈真有第一波羅蜜哉順俗諦故說第一波羅蜜順真諦即非第一波羅蜜順中道第一義諦是名第一波羅蜜而聞之不驚怖畏者豈不同謂之希有耶須菩提忍辱波羅蜜至又說一切衆生即非衆生注羞自外至者為辱忍謂不起恨心以亂真性也昔往昔也為猶被也梵語歌利華言極惡割剝也截斷也支四體也解散也瞋氣盛也恨怨甚也五百世指前世而言忍辱則無恨無恨則無苦無苦則有樂故曰仙人則無苦而有樂矣講佛告須菩提云世間萬事莫妙于忍而最難忍者莫過于辱凡有橫逆之事辱境之來怡然處之不起瞋恨以亂本性則心同太虗即到覺地此忍辱波羅蜜也然本性真空無相果能妄怒不行絶不留含忍之意則外不見其有辱內不見其能忍渾然兩忘此如來說非忍辱波羅蜜是名忍辱波羅蜜也此何以故須菩提如我往昔因中被歌利王割截身體辱亦至矣我于爾時心如虗空不起四相不見割截者是我割截我者是人割截之人是衆生被割截之我是壽者此何故而能然也我于往昔節節支解時已辱之極勢若難忍設有四相必生瞋恨之心不能順受矣又何以為忍辱乎然此特一世事耳須菩提我又念過去于五百世前曾作忍辱仙人修忍辱行於爾時所處之世亦無我人等四相此所以久修忍辱行而視忍辱為常直忍無所忍耳甚矣相之不可著也就忍辱推之而一切俱應離相是故須菩提學道菩薩欲成佛道當離去一切形相湛然中虗發無上正等正覺之心不當住色而生可好之心不當住于聲香味觸法而生可欲之心當生清淨無所住著心則此心真純無欲圓通無礙非一切相之所繫縛乃為應住若心於六塵上一有所住便生妄想不能離相則非菩薩所應住矣又即一切之中摘出布施言之是故佛說菩薩心不應住著色相布施一菩薩不為自身五欲快樂而行布施但為利益一切衆生故應如是不住色相布施若布施住色相見有可施之物所施之人行施之我是不離一切相啓衆生以著相之心豈菩薩利益衆生而欲同登彼岸之心乎所以如來常說一切諸相總是幻有于真性中本來無相非真相也又說一切衆生者以心有四相迷而不悟故為衆生若使妄念咸消人我一體即非衆生矣相與衆生本無住而心又何可有住耶須菩提如來是真語者至所得法此法無實無虗注真則不僞實則不虗如必當理誑欺誑也異怪異也始終一致亦曰不異講佛告須菩提如來以前所說或明我空顯般若之深或明法空顯般若之甚深是真切語者是誠實語者是如理而語非幻妄不常者是實心慈悲不為欺誑之語者是至庸至一不為變易怪異之語者總是說無上菩提欲人了悟佛法須菩提如來所說乃如來所得虗則著空實則著有如來所得法將以此法為實耶本體空寂無相可得實而虗莫知其所為實也將以此法為虗耶妙用無方取之不匱虗而實莫知其所為虗也實而非實虗而非虗體用備矣此法之妙誠以是哉須菩提菩薩心住於法至皆得成就無量無邊功德注住于法者執著于法謂非隨機化導而住法塵也布施法施也乃教化衆生之謂當來世猶云將來後世也指如來滅後像法末世言講佛語須菩提我謂布施者有財施言法施法施教化衆生使皆成佛也然雖曰法施凡所說之法總是隨人迷悟淺深迎機化導使悟本性皆是假設故菩薩心行布施亦不當住法若心住於法而行布施法亦是塵遮蔽真空性體障起無明貪愛四相未除如人入暗室之中昏黑一無所見矣若菩薩心不住法而行布施則無法塵障蔽真性洞達無礙遇衆生施教如人本有眼目又當皎日之照黑白分明毫無隱匿悉見種種形色矣此所以貴心無住法也當知是經但詮無住之法使衆生明真如本性了悟自性中莫大之功用德行却無定法可求亦無定法可執實為希有無人不當受持非夙世種善根者未易值遇現在不消說得須菩提當來之世若有善男善女能于此經受持讀誦深信無相無住之理不徒為口耳之學一一究明其義而心悟真空之妙是人即為如來以佛智慧眼照鑒之盡知盡見普加覆護是等之人皆得成就無量無邊見性功德周法界而無方自悟悟人普度羣生歷萬劫而常在覺遍一時連于後世其為功德豈有限量邊岸哉持經功德分第十五分為二節受持此經者即能成就無量無邊功德持兼行持誦持功德不離自性兼自覺覺他言須菩提若有善男子善女人至受持讀誦為人解說注初日分謂早晨中日分謂日午後日分謂晚間分時分也等者數相比也講佛語須菩提設有善男善女於初日分以恆河沙等身命之多方便布施及日中時分亦復如是至日晚時分又復如是一日之間三度捨身至于百千萬億劫數皆以身施可云勤且多難且久矣其獲福報應亦無量然所獲者止是世間有為之福未能離乎煩惱而終有盡也若復有人聞此經典即信于心隨順其說而不違逆此為善入福慧當受出世間福其福已勝彼世間捨身之福何況書寫以流通其章句受持而身行其法讀誦而尋繹其文解悟其理又以是經廣為解說其義使人聞經信解力行不倦則非徒自明己性且教人各明其性其福德又安有量哉須菩提以要言之至以諸華香而散其處注要簡要也思心思也議言議也稱稱稱量器量功以進修言德以全理言乘者車乘也取行載義發者發起也大乘菩薩乘也最上乘佛乘也背負曰荷在肩曰擔樂喜好也小法小乘法也在在處處言其所在之處不一也講佛告須菩提舉要言之是經顯真空法性明無相真宗此般若經法有不可以心思測度不可以言論擬議又不可以如物而稱量其輕重多少也則此經之功德無邊際雖讚歎有所不能盡而如來其容易說乎為發大乘心者說為發最上乘心者說也蓋此經有無邊功德如來說此不止教人自修出世成就一己而已實使自度度人也發大乘者普載一切衆生同到彼岸已是菩薩地位矣然猶未也發最上乘者則不止普度衆生將并菩薩兼載之方是成佛地位如來為說之意其法力廣大如此而能承任者亦難矣若有人能受持讀誦既以成己廣為人說又能成人人己兼成功德無量如來于此一一悉知悉見是人成就此經所具功德等無有異如是人等其力量之大信堪荷擔如來無上正等正覺之法無難也此何以故蓋持說是經者皆能發大乘最上乘心而法亦能任其大矣若喜樂小乘法者只知有己不知有人便是著我人衆生壽者之四見惑於幻相未悟真空即於此經無相妙義毫無領略于己不能聽受讀誦于人不能解說開導是將不可思議功德而輕棄之豈能承任無上菩提故佛不為彼說非有所偏也當知此經永為萬世不刊之典須菩提但隨經所在之處一切世間天道人道阿修羅道所當供養者也當知此經所在之處即為如來真身舍利寶塔皆應起恭敬之心作禮而五體投地圍繞而大衆歸依以諸種華香而散滿其處以為供養也能淨業障分第十六能淨業障言此經之功德能消滅能世之罪業障者言罪業之障蔽心光如帷幔之障蔽人目不目天日也經力固能淨障須要受持能淨其心斯真受持若以清淨心受持讀誦此經先世罪業安有不消先世且消而況現在者乎復次須菩提若善男子善女人至果報亦不可思議注惡道猶惡境極言之則三惡道也先世即前生梵語阿僧祇猶云無盡數那由他猶云一萬萬劫者世也值遇也十萬曰億總極言其多承事順承奉事也具說者盡說也狐是狐狸其性多疑故人之多疑不決者曰狐疑功有所成曰果理有所驗曰報非止今生後世果報之說也講弟子復編次佛語須菩提曰人能持經不惟成就無邊功德并可消宿世業障若有善男善女能受持讀誦此經真可敬重者也而反為人所輕真可尊貴者也而反為人所賤其故何哉蓋必是人先世未聞經時執泥四相染著六塵造有罪孽當墮惡道以今世人輕賤故准抵得先世罪孽即盡為消滅矣既免惡報真性亦開是能除妄歸真當得無上菩提之正果而持經功德為何如哉須菩提持經功德即成無上菩提此非妄言也試以我證之我思過去無盡數萬劫在然燈佛前得遇八百四千萬億無數諸佛悉皆供養而不敢怠承事而不敢違無空過一處而不供養者是我歷事諸佛之多如此若復有人於後來末法之世能受持讀誦此經其所得功德以較我供養諸佛之功德我百分尚不及其一分直推到千萬億分乃至算數之多譬喻之廣亦不能及也蓋供佛止求福報而持經則圓明本心永脫輪回是豈所能較量也哉持經功德勝於供佛功德世人應信我言矣然而猶未也須菩提若善男善女於後來末法之世有能受持讀誦所得無量功德我若盡言其詳或有鈍根小智之人聞之反生疑畏之心狂而無定持亂而無定見輾轉狐疑而不能信所以我尚未盡說耳當知此經之義深遠難測乃真空無相最上乘法不可以心思言議而窮其蘊也至於受持讀誦先世之罪業減消無量之功德難及而其所得果報又豈可以心思言議也哉
